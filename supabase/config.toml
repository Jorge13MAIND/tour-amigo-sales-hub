# Edge Function configuration
# Functions called from Command Center (authenticated users) → verify_jwt = true
# Functions called by pg_cron / agents (no user session) → verify_jwt = false

[functions.hubspot-proxy]
verify_jwt = true

[functions.complete-task]
verify_jwt = true

[functions.process-approval]
verify_jwt = true

[functions.deal-room-chat]
verify_jwt = true

[functions.hubspot-sync]
verify_jwt = false

[functions.deal-monitor]
verify_jwt = false

[functions.sequence-enroll]
verify_jwt = false

[functions.hubspot-setup-properties]
verify_jwt = false
